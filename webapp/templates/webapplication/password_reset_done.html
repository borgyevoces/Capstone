<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email - KabsuEats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 20px 32px;
        }

        .logo {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.6em;
            color: #1a1a2e;
            font-weight: bold;
            text-decoration: none;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
        }

        .email-icon {
            font-size: 52px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.85em;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .message {
            color: #6b7280;
            font-size: 0.95em;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .note {
            color: #9ca3af;
            font-size: 0.85em;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .back-btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background-color: #1a1a2e;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: #2a2a4e;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="logo">KabsuEats</a>
    </div>

    <div class="page-wrapper">
        <div class="card">
            <div class="email-icon">📧</div>
            <h1>Check your email</h1>
            <p class="message">
                We've sent password reset instructions to your email address. Please check your inbox.
            </p>
            <p class="note">
                If you don't receive an email within a few minutes, make sure you've entered the address you registered with and check your spam folder.
            </p>
            <a href="{% url 'user_login_register' %}" class="back-btn">Back to Login</a>
        </div>
    </div>
</body>
</html>
