<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background-color: #f5f5f5; }
        .container { width: 85%; max-width: 400px; padding: 40px 30px; border-radius: 20px; background-color: #ffffff; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15); }
        .header-bar { border-radius: 12px 12px 0 0; padding: 16px 20px; margin: -40px -30px 25px -30px; }
        .header-bar.client { background-color: #e59b20; }
        .header-bar.owner { background-color: #1a1a2e; }
        .logo-text { font-size: 1.3em; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .portal-badge { font-size: 0.78em; color: rgba(255,255,255,0.8); margin-top: 2px; }
        h2 { font-size: 1.6em; font-weight: bold; margin-bottom: 12px; }
        h2.client { color: #e59b20; }
        h2.owner { color: #1a1a2e; }
        .success-icon { font-size: 56px; color: #4caf50; margin-bottom: 16px; }
        .message { font-size: 14px; color: #555; margin-bottom: 28px; line-height: 1.6; }
        .action-btn { display: inline-block; min-width: 200px; padding: 14px 30px; border-radius: 25px; border: none; font-size: 1em; font-weight: bold; text-decoration: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .action-btn.client { background-color: #e59b20; color: #fff; }
        .action-btn.client:hover { background-color: #d48a1a; transform: translateY(-2px); }
        .action-btn.owner { background-color: #1a1a2e; color: #e59b20; border: 2px solid #e59b20; }
        .action-btn.owner:hover { background-color: #2a2a4e; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar {% if is_owner %}owner{% else %}client{% endif %}">
            <div class="logo-text">&#127374; KabsuEats</div>
            <div class="portal-badge">{% if is_owner %}&#127978; Business Owner Portal{% else %}&#127891; Student / School Personnel{% endif %}</div>
        </div>
        <div class="success-icon">&#10003;</div>
        <h2 class="{% if is_owner %}owner{% else %}client{% endif %}">Password Reset Complete!</h2>
        <p class="message">Your password has been successfully reset.<br>You can now log in with your new password.</p>
        <a href="{{ login_url }}" class="action-btn {% if is_owner %}owner{% else %}client{% endif %}">{{ login_label }}</a>
    </div>
</body>
</html>
