<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete - KabsuEats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            padding: 20px 32px;
        }

        .logo {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.6em;
            color: #1a1a2e;
            font-weight: bold;
            text-decoration: none;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
        }

        .success-icon {
            width: 60px;
            height: 60px;
            background-color: #d1fae5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 24px;
        }

        .portal-tag {
            display: inline-block;
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .portal-tag.client {
            background-color: #fef3c7;
            color: #d97706;
        }

        .portal-tag.owner {
            background-color: #e8e8f0;
            color: #1a1a2e;
        }

        h1 {
            font-size: 1.85em;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .message {
            color: #6b7280;
            font-size: 0.95em;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .action-btn.client {
            background-color: #1a1a2e;
            color: #ffffff;
        }

        .action-btn.client:hover { background-color: #2a2a4e; }

        .action-btn.owner {
            background-color: #1a1a2e;
            color: #e59b20;
            border: 2px solid #e59b20;
        }

        .action-btn.owner:hover { background-color: #2a2a4e; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="logo">KabsuEats</a>
    </div>

    <div class="page-wrapper">
        <div class="card">
            <div class="success-icon">✓</div>

            <div class="portal-tag {% if is_owner %}owner{% else %}client{% endif %}">
                {% if is_owner %}🏪 Business Owner Portal{% else %}🎓 Student / School Personnel{% endif %}
            </div>

            <h1>Password reset complete!</h1>
            <p class="message">
                Your password has been successfully reset.<br>
                You can now log in with your new password.
            </p>

            <a href="{{ login_url }}" class="action-btn {% if is_owner %}owner{% else %}client{% endif %}">
                {{ login_label }}
            </a>
        </div>
    </div>
</body>
</html>
